pre-commit:
  parallel: false
  jobs:
    - name: biome
      glob: "*.{js,jsx,ts,tsx,json,jsonc,astro,css}"
      run: npx @biomejs/biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    - name: typecheck
      run: npx astro check
    - name: test
      run: npm test
